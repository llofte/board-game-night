// ── Airtable config ───────────────────────────────────────────
const AT_BASE  = "appMG6K6WduzpxNM4";
const AT_TOKEN = "patCY48blO7Sv1Z5m.491a90d11651fc731c5cfe573bddc4a1ca6ba0a92f942934ed4a4a0902b328de";
const AT_URL   = `https://api.airtable.com/v0/${AT_BASE}`;
const AT_HDR   = { "Authorization": `Bearer ${AT_TOKEN}`, "Content-Type": "application/json" };

// ── Airtable helpers ──────────────────────────────────────────
async function atFetch(table, qs = "") {
  let records = [], offset = null;
  do {
    let url = `${AT_URL}/${encodeURIComponent(table)}?pageSize=100${qs ? "&" + qs : ""}`;
    if (offset) url += `&offset=${encodeURIComponent(offset)}`;
    const res  = await fetch(url, { headers: { "Authorization": `Bearer ${AT_TOKEN}` } });
    const data = await res.json();
    records = records.concat(data.records || []);
    offset  = data.offset || null;
  } while (offset);
  return records;
}
async function atCreate(table, fields) {
  const res  = await fetch(`${AT_URL}/${encodeURIComponent(table)}`, {
    method: "POST", headers: AT_HDR,
    body: JSON.stringify({ records: [{ fields }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.records[0];
}
async function atUpdate(table, recordId, fields) {
  const res  = await fetch(`${AT_URL}/${encodeURIComponent(table)}/${recordId}`, {
    method: "PATCH", headers: AT_HDR,
    body: JSON.stringify({ fields })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}
async function atDelete(table, recordId) {
  const res  = await fetch(`${AT_URL}/${encodeURIComponent(table)}/${recordId}`, {
    method: "DELETE", headers: AT_HDR
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

// ── Data parsers ──────────────────────────────────────────────
function parseGame(r) {
  const f = r.fields;
  return {
    id:           r.id,
    name:         f["Game Name"]     || "",
    min:          f["Min Players"]   ?? null,
    max:          f["Max Players"]   ?? null,
    expansionMin: f["Expansion Min"] ?? null,
    expansionMax: f["Expansion Max"] ?? null,
    owners:       f["Owners"] ? f["Owners"].split(",").map(s => s.trim()) : [],
    genre:        f["Genre"]        || null,
    rulesUrl:     f["Rules URL"]   || null,
    bggUrl:       f["BGG URL"]     || null,
    tutorialUrl:  f["Tutorial URL"]|| null,
    notes:        f["Notes"]       || null,
    favorite:     f["Favorite"]    === true
  };
}
function parseSession(r) {
  const f = r.fields;
  return {
    id:       r.id,
    date:     f["Date"]    || "",
    game:     f["Game"]    || "",
    players:  f["Players"] ? f["Players"].split(",").map(s => s.trim()).filter(Boolean) : [],
    places:   [f["1st Place"], f["2nd Place"], f["3rd Place"]].filter(Boolean),
    duration: f["Duration"] || null,
    notes:    f["Notes"]   || null
  };
}
function parseExpansion(r) {
  const f = r.fields;
  return { game: f["Game"] || "", name: f["Expansion Name"] || "", owned: f["Owned"] === true, owner: f["Owner"] || "" };
}
function parseTeamSession(r) {
  const f = r.fields;
  return {
    id:         r.id,
    date:       f["Date"] || "",
    game:       f["Game"] || "",
    team1:      f["Team 1"] ? f["Team 1"].split(",").map(s => s.trim()).filter(Boolean) : [],
    team2:      f["Team 2"] ? f["Team 2"].split(",").map(s => s.trim()).filter(Boolean) : [],
    team1score: f["T1 Score"] ?? null,
    team2score: f["T2 Score"] ?? null,
    winner:     f["Winner"] ? f["Winner"].toLowerCase().replace(/\s/g, "") : "",
    duration:   f["Duration"] || null,
    notes:      f["Notes"]   || null
  };
}

// ── Constants ─────────────────────────────────────────────────
const PLACE_PTS = [3, 2, 1];
const MEDALS    = ["🥇", "🥈", "🥉"];
const COOP_WIN  = "Everyone!";
const COOP_LOSS = "Loss";
const DNF       = "DNF";


// ── Module state (shared with modals) ─────────────────────────
let _playLog      = [];
let _gamesLibrary = [];
let _expansions   = {};   // { gameName: [{ name, owned }] }
let _playerStats  = {};
let _leaderboard  = [];
let _gameCounts   = {};
let _chart        = null;
let _teamSessions = [];
let _logEditId    = null;   // record ID when editing a session (null = new)
let _logEditType  = null;   // 'regular' | 'team'
let _agEditId       = null;   // record ID when editing a game (null = new)
let _agLastSavedId  = null;   // record ID of last successfully saved edit — used to return to game detail on close
let _filterCount = 'all';  // player count filter: 'all' | number
let _pendingFavorites = {};  // { gameId: bool } — survives re-renders until saved

// ── Helpers ───────────────────────────────────────────────────
function fmtDate(d) {
  const [y, m, day] = d.split("-");
  return `${m}-${day}-${y}`;
}
function fmtDuration(mins) {
  if (!mins) return "—";
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}
function fmtDateTwoLine(d) {
  const [y, m, day] = d.split("-");
  return `${m}-${day}-<br><span style="color:var(--text-muted)">${y}</span>`;
}
function fmtDurationTwoLine(mins) {
  if (!mins) return `<div style="color:var(--text-muted)">—</div>`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h === 0) return `<div>${m}m</div>`;
  if (m === 0) return `<div>${h}h</div>`;
  return `<div>${h}h</div><div>${m}m</div>`;
}
function formatOwners(owners) {
  const result = [];
  let remaining = [...owners];
  if (remaining.includes("Dave") && remaining.includes("Leanna")) {
    result.push("Loftes");
    remaining = remaining.filter(o => o !== "Dave" && o !== "Leanna");
  }
  if (remaining.includes("Ben") && remaining.includes("Shannon")) {
    result.push("Harrells");
    remaining = remaining.filter(o => o !== "Ben" && o !== "Shannon");
  }
  if (remaining.includes("Marc") && remaining.includes("Heather")) {
    result.push("Pavones");
    remaining = remaining.filter(o => o !== "Marc" && o !== "Heather");
  }
  return [...result, ...remaining];
}
function buildPodiumHTML(s) {
  if (s.places[0] === COOP_WIN)  return `<span style="color:var(--accent-bright)">Co-op win 🎉</span>`;
  if (s.places[0] === COOP_LOSS) return `<span style="color:var(--red)">Co-op loss</span>`;
  if (s.places[0] === DNF)       return `<span style="color:#8a9298">DNF</span>`;
  return s.places.slice(0, 3).map((name, i) => `<span>${MEDALS[i]} ${name}</span>`).join("");
}

// ── Renders game notes: dashes become bullets, else paragraph ─
function renderNotes(notes) {
  if (!notes) return '';
  const hasDash = notes.trimStart().startsWith('-') || notes.includes(' - ');
  if (hasDash) {
    const items = notes.split(/(?:^|\s+)-\s+/).map(s => s.trim()).filter(Boolean);
    return '<ul>' + items.map(s => `<li>${s}</li>`).join('') + '</ul>';
  }
  return `<p style="margin:0">${notes}</p>`;
}

// ── Renders expansion name with parentheticals in muted gray ──
function fmtExpName(name) {
  return name.replace(/(\(.*?\))/g, '<span style="color:var(--text-muted)">$1</span>');
}

// ── Returns true if the game has at least one owned expansion ─
function hasOwnedExpansion(gameName) {
  const exps = _expansions[gameName];
  return exps ? exps.some(e => e.owned) : false;
}

// ── Formats [1,2,3,4,6] → "1–4, 6" ──────────────────────────
function formatCountsDisplay(counts) {
  if (!counts.length) return "";
  const ranges = [];
  let start = counts[0], end = counts[0];
  for (let i = 1; i < counts.length; i++) {
    if (counts[i] === end + 1) { end = counts[i]; }
    else { ranges.push(start === end ? `${start}` : `${start}–${end}`); start = end = counts[i]; }
  }
  ranges.push(start === end ? `${start}` : `${start}–${end}`);
  return ranges.join(", ");
}

// ── Base player counts from min/max ───────────────────────────
function baseCounts(game) {
  const counts = [];
  if (game.min != null && game.max != null) {
    for (let i = game.min; i <= game.max; i++) counts.push(i);
  }
  return counts;
}

// ── Expansion range as array (additive — unioned with base) ───
function expansionRange(game) {
  if (game.expansionMin == null || game.expansionMax == null) return [];
  const counts = [];
  for (let i = game.expansionMin; i <= game.expansionMax; i++) counts.push(i);
  return counts;
}

// ── Effective counts when expansion is owned (additive) ───────
function effectiveCounts(game) {
  const base = baseCounts(game);
  if (hasOwnedExpansion(game.name) && expansionRange(game).length > 0) {
    return [...new Set([...base, ...expansionRange(game)])].sort((a, b) => a - b);
  }
  return base;
}

// ── Combined base + expansion (for display regardless of ownership) ─
function combinedCounts(game) {
  const exp = expansionRange(game);
  if (!exp.length) return null;
  return [...new Set([...baseCounts(game), ...exp])].sort((a, b) => a - b);
}

// ── Filter button render (dynamic based on game library) ─────
function renderFilterButtons() {
  const counts = new Set();
  _gamesLibrary.forEach(game => effectiveCounts(game).forEach(c => counts.add(c)));
  const sorted = [...counts].sort((a, b) => a - b);
  const bar = document.getElementById('filter-bar');
  bar.innerHTML =
    `<button class="filter-btn${_filterCount === 'all' ? ' active' : ''}" data-count="all">All</button>` +
    sorted.map(n => `<button class="filter-btn${_filterCount === n ? ' active' : ''}" data-count="${n}">${n}</button>`).join('');
}

// ── Catalog render (uses module state) ────────────────────────
const catalogGrid = document.getElementById("catalog-grid");
function renderCatalog() {
  catalogGrid.innerHTML = "";
  let games = [..._gamesLibrary];
  if (_filterCount !== 'all') games = games.filter(g => effectiveCounts(g).includes(_filterCount));
  // Favorites float to top
  games.sort((a, b) => (b.favorite ? 1 : 0) - (a.favorite ? 1 : 0));
  games.forEach(game => {
    const plays = _gameCounts[game.name] || 0;
    const counts = effectiveCounts(game);
    const playerStr = formatCountsDisplay(counts);

    // Build card via createElement so we can attach listeners to real references
    const card = document.createElement("div");
    card.className = "game-card";
    card.dataset.gameId = game.id;

    const header = document.createElement("div");
    header.className = "game-card-header";

    const nameDiv = document.createElement("div");
    nameDiv.className = "game-card-name";
    nameDiv.textContent = game.name;

    const faveBtn = document.createElement("button");
    faveBtn.type = "button";
    faveBtn.className = "game-fave-btn" + (game.favorite ? " active" : "");
    faveBtn.dataset.gameId = game.id;
    faveBtn.textContent = "★";

    header.appendChild(nameDiv);
    header.appendChild(faveBtn);

    const meta = document.createElement("div");
    meta.className = "game-card-meta";
    meta.innerHTML = `<span class="game-card-players">${playerStr}</span><span class="game-card-plays">${plays > 0 ? `${plays}×` : "—"}</span>`;

    card.appendChild(header);
    card.appendChild(meta);

    card.addEventListener("click", function(e) {
      if (e.target.closest('.game-fave-btn')) return; // star handled separately
      openGameModal(game);
    });

    catalogGrid.appendChild(card);
  });
}

// ── Star toggle — document capture so nothing can block it ────
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.game-fave-btn');
  if (!btn || !btn.dataset.gameId) return;
  e.stopPropagation();
  e.preventDefault();
  const game = _gamesLibrary.find(g => g.id === btn.dataset.gameId);
  if (!game) return;
  game.favorite = !game.favorite;
  _pendingFavorites[game.id] = game.favorite;
  btn.classList[game.favorite ? 'add' : 'remove']('active');
  btn.style.color = game.favorite ? '#e09040' : '#3a4558';
  atUpdate('Games Library', game.id, { Favorite: game.favorite })
    .then(() => { delete _pendingFavorites[game.id]; })
    .catch(() => {});
  localStorage.removeItem(CACHE_KEY);
}, true); // true = capture phase, fires before anything else

// ── Main render ───────────────────────────────────────────────
function renderDashboard(gamesLibrary, playLog, expansions, teamSessions) {
  // Apply any pending star changes so a background re-render doesn't wipe them
  _gamesLibrary = gamesLibrary.map(g =>
    g.id in _pendingFavorites ? { ...g, favorite: _pendingFavorites[g.id] } : g
  );
  _playLog      = playLog;
  _teamSessions = teamSessions || [];

  // Build expansions lookup from API data
  _expansions = {};
  (expansions || []).forEach(e => {
    if (!_expansions[e.game]) _expansions[e.game] = [];
    _expansions[e.game].push({ name: e.name, owned: e.owned, owner: e.owner || '' });
  });

  // Derived stats
  _playerStats = {};
  playLog.forEach(session => {
    session.players.forEach(p => {
      if (!_playerStats[p]) _playerStats[p] = { sessions: 0, pts: 0, firsts: 0, seconds: 0, thirds: 0 };
      _playerStats[p].sessions++;
      _playerStats[p].pts += 1; // participation point
    });
    // Podium bonus points (competitive games only)
    if (session.places[0] !== COOP_WIN && session.places[0] !== COOP_LOSS && session.places[0] !== DNF) {
      session.places.forEach((p, i) => {
        if (!_playerStats[p]) return;
        _playerStats[p].pts += PLACE_PTS[i] ?? 0;
        if (i === 0) _playerStats[p].firsts++;
        if (i === 1) _playerStats[p].seconds++;
        if (i === 2) _playerStats[p].thirds++;
      });
    }
  });

  // Team sessions — fold into main leaderboard
  _teamSessions.forEach(ts => {
    const winning = ts.winner === 'team1' ? ts.team1 : ts.winner === 'team2' ? ts.team2 : [];
    [...ts.team1, ...ts.team2].forEach(p => {
      if (!_playerStats[p]) _playerStats[p] = { sessions: 0, pts: 0, firsts: 0, seconds: 0, thirds: 0 };
      _playerStats[p].sessions++;
      _playerStats[p].pts += 1; // participation
    });
    winning.forEach(p => {
      if (!_playerStats[p]) return;
      _playerStats[p].pts    += PLACE_PTS[0]; // +3, same as individual 1st
      _playerStats[p].firsts++;
    });
  });

  // Build leaderboard AFTER all sessions (regular + team) are processed
  _leaderboard = Object.entries(_playerStats)
    .map(([name, s]) => ({ name, ...s }))
    .sort((a, b) => b.pts - a.pts || b.firsts - a.firsts);

  _gameCounts = {};
  playLog.forEach(s => { _gameCounts[s.game] = (_gameCounts[s.game] || 0) + 1; });
  _teamSessions.forEach(ts => { _gameCounts[ts.game] = (_gameCounts[ts.game] || 0) + 1; });

  const sortedGames  = Object.entries(_gameCounts).sort((a, b) => b[1] - a[1]);
  const totalSessions = playLog.length + _teamSessions.length;
  const maxPlays     = sortedGames[0]?.[1] ?? 0;
  const topGames     = sortedGames.filter(([, n]) => n === maxPlays);
  const mostPlayed   = topGames.length === 0 ? "—"
                     : topGames.length === 1 ? topGames[0][0]
                     : topGames.length === 2 ? `${topGames[0][0]} & ${topGames[1][0]}`
                     : `${topGames.length}-way tie`;
  const champion     = _leaderboard[0];

  // Stat cards
  const statGrid = document.getElementById("stat-grid");
  statGrid.innerHTML = "";
  [
    { label: "Total<br>Sessions",   value: totalSessions,         sub: "game nights" },
    { label: "Games in<br>Library", value: gamesLibrary.length,   sub: "titles" },
    { label: "Most<br>Played",      value: mostPlayed,            sub: maxPlays > 0 ? `${maxPlays}× played` : "" },
    { label: "Current<br>Champion", value: champion?.name ?? "—", sub: champion ? `${champion.pts} pts` : "" },
  ].forEach(s => {
    statGrid.innerHTML += `
      <div class="stat-card">
        <div class="label">${s.label}</div>
        <div class="value">${s.value}</div>
        <div class="sub">${s.sub}</div>
      </div>`;
  });

  // Leaderboard
  const tbody = document.getElementById("leaderboard-body");
  tbody.innerHTML = "";
  _leaderboard.forEach((p, i) => {
    const rankDisplay = MEDALS[i] ?? `${i + 1}.`;
    tbody.innerHTML += `
      <tr style="cursor:pointer" onclick="openPlayerModal('${p.name}')">
        <td><span class="rank">${rankDisplay}</span> <span class="player-link">${p.name}</span></td>
        <td style="text-align:right">${p.sessions}</td>
        <td class="pts-col">${p.pts}</td>
        <td class="firsts-col">${p.firsts}</td>
      </tr>`;
  });

  // Chart — size dynamically so all bars have room
  const chartWrap = document.querySelector(".chart-wrap");
  chartWrap.style.height = Math.max(200, sortedGames.length * 20 + 16) + "px";
  if (_chart) _chart.destroy();
  const ctx = document.getElementById("games-chart").getContext("2d");
  _chart = new Chart(ctx, {
    type: "bar",
    plugins: [{
      id: "barLabels",
      afterDatasetsDraw(chart) {
        const { ctx: c } = chart;
        chart.data.datasets.forEach((dataset, i) => {
          chart.getDatasetMeta(i).data.forEach((bar, index) => {
            const value = dataset.data[index];
            c.save();
            c.fillStyle = "#c8ccd8";
            c.font = "11px Courier New";
            c.textAlign = "left";
            c.textBaseline = "middle";
            c.fillText(value, bar.x + 5, bar.y);
            c.restore();
          });
        });
      }
    }],
    data: {
      labels: sortedGames.map(([g]) => g),
      datasets: [{
        data: sortedGames.map(([, n]) => n),
        backgroundColor: "rgba(192,122,56,0.6)",
        borderColor: "rgba(212,148,70,1)",
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      indexAxis: "y",
      maintainAspectRatio: false,
      layout: { padding: { right: 28 } },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      scales: {
        x: { display: false },
        y: {
          ticks: { color: "#c8ccd8", font: { size: 11 } },
          grid: { display: false },
          border: { color: "#2a3040" },
        }
      }
    }
  });

  // Recent sessions — merge regular + team, sort by date
  const sessionList = document.getElementById("session-list");
  sessionList.innerHTML = "";
  const allSessions = [
    ...playLog.map(s => ({ ...s, _type: 'regular' })),
    ..._teamSessions.map(ts => ({ ...ts, _type: 'team' }))
  ].sort((a, b) => b.date.localeCompare(a.date));

  allSessions.forEach(s => {
    if (s._type === 'team') {
      const hasScore = s.team1score !== null && s.team2score !== null;
      const t1win = s.winner === 'team1';
      const t2win = s.winner === 'team2';
      sessionList.innerHTML += `
        <div class="session" data-game="${s.game}" data-session-id="${s.id}" data-session-type="teams">
          <div class="session-top">
            <span class="session-game">${s.game}</span>
            <span class="session-date">${fmtDate(s.date)}</span>
          </div>
          <div class="session-teams">
            <span class="team-label${t1win ? ' winner' : ''}">${s.team1.join(', ')}</span>
            <span class="team-vs">vs</span>
            <span class="team-label${t2win ? ' winner' : ''}">${s.team2.join(', ')}</span>
          </div>
          ${hasScore ? `<div class="session-score">${s.team1score} – ${s.team2score}</div>` : ''}
          ${s.notes ? `<div class="session-notes">${s.notes}</div>` : ''}
          <button class="session-edit-btn" data-session-id="${s.id}" data-session-type="teams"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>
        </div>`;
    } else {
      sessionList.innerHTML += `
        <div class="session" data-game="${s.game}" data-session-id="${s.id}" data-session-type="regular">
          <div class="session-top">
            <span class="session-game">${s.game}</span>
            <span class="session-date">${fmtDate(s.date)}</span>
          </div>
          <div class="session-players">${s.players.join(", ")}</div>
          <div class="session-podium">${buildPodiumHTML(s)}</div>
          ${s.notes ? `<div class="session-notes">${s.notes}</div>` : ""}
          <button class="session-edit-btn" data-session-id="${s.id}" data-session-type="regular"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>
        </div>`;
    }
  });

  // Catalog
  renderFilterButtons();
  renderCatalog();
}

// ── Game Modal ────────────────────────────────────────────────
function openGameModal(game) {
  const sessions     = _playLog.filter(s => s.game === game.name);
  const teamSessions = _teamSessions.filter(ts => ts.game === game.name);
  const totalPlays   = sessions.length + teamSessions.length;
  const winCounts = {};
  sessions.forEach(s => {
    const first = s.places[0];
    if (first && first !== COOP_WIN && first !== COOP_LOSS && first !== DNF) {
      winCounts[first] = (winCounts[first] || 0) + 1;
    }
  });
  const topWinner = Object.entries(winCounts).sort((a, b) => b[1] - a[1])[0];
  const allDurations = [
    ...sessions.filter(s => s.duration).map(s => s.duration),
    ...teamSessions.filter(ts => ts.duration).map(ts => ts.duration)
  ];
  const avgTime = allDurations.length
    ? Math.round(allDurations.reduce((a, b) => a + b, 0) / allDurations.length) : null;
  const byCount = {};
  sessions.forEach(s => {
    if (!s.duration) return;
    const n = s.players.length;
    if (!byCount[n]) byCount[n] = { total: 0, count: 0 };
    byCount[n].total += s.duration; byCount[n].count++;
  });
  const groupAvgs = Object.entries(byCount).sort(([a], [b]) => a - b)
    .map(([n, d]) => ({ players: n, avg: Math.round(d.total / d.count) }));

  document.getElementById("modal-title").textContent = game.name;
  const expCounts = expansionRange(game);
  const expLine = expCounts.length ? `<br>${formatCountsDisplay(expCounts)} w/ expansion` : "";
  document.getElementById("modal-subtitle").innerHTML = `${game.min}–${game.max} players${expLine}`;
  const bggUrl = game.bggUrl || `https://boardgamegeek.com/search/boardgame?q=${encodeURIComponent(game.name)}`;
  // Star is first item in links row — rendered fresh each open so toggle is always in sync
  document.getElementById("modal-links").innerHTML =
    `<button class="modal-fave-btn${game.favorite ? ' active' : ''}" id="modal-fave-btn">★</button>`
    + `<a class="modal-rules-btn" href="${bggUrl}" onclick="event.preventDefault();window.open('${bggUrl}','_blank','noopener')">BGG ↗</a>`
    + (game.rulesUrl ? `<a class="modal-rules-btn" href="${game.rulesUrl}" onclick="event.preventDefault();window.open('${game.rulesUrl}','_blank','noopener')">Rules ↗</a>` : '')
    + (game.tutorialUrl ? `<a class="modal-rules-btn" href="${game.tutorialUrl}" onclick="event.preventDefault();window.open('${game.tutorialUrl}','_blank','noopener')">Tutorial ↗</a>` : '');
  // Wire up after innerHTML so we have a fresh reference
  const modalFaveBtn = document.getElementById("modal-fave-btn");
  if (game.favorite) modalFaveBtn.style.color = '#e09040';
  modalFaveBtn.onclick = () => {
    game.favorite = !game.favorite;
    _pendingFavorites[game.id] = game.favorite;
    const b = document.getElementById('modal-fave-btn');
    b.classList[game.favorite ? 'add' : 'remove']('active');
    b.style.color = game.favorite ? '#e09040' : '#3a4558';
    atUpdate("Games Library", game.id, { Favorite: game.favorite })
      .then(() => { delete _pendingFavorites[game.id]; })
      .catch(() => {});
    localStorage.removeItem(CACHE_KEY);
  };
  const ownersEl = document.getElementById("modal-owners");
  if (game.owners && game.owners.length > 0) {
    ownersEl.style.display = "";
    ownersEl.innerHTML = `<span class="modal-owners-label">Owned by</span>`
      + formatOwners(game.owners).map(o => `<span class="owner-tag">${o}</span>`).join("");
  } else { ownersEl.style.display = "none"; }
  const expListEl = document.getElementById("modal-expansions");
  const knownExps = _expansions[game.name];
  if (knownExps && knownExps.length > 0) {
    expListEl.style.display = "";
    // If the game has exactly one owner, suppress that owner tag on expansions they own
    const formattedGameOwners = formatOwners(game.owners);
    const singleOwner = formattedGameOwners.length === 1 ? formattedGameOwners[0] : null;
    expListEl.innerHTML = `
      <div class="modal-expansions-label">Expansions</div>
      <div class="expansion-grid">
        ${knownExps.map(e => {
          const ownerTag = (e.owner && e.owner !== singleOwner) ? `<span class="exp-owner">${e.owner}</span>` : "";
          return `
          <div class="expansion-item${e.owned ? " owned" : ""}">
            <span class="${e.owned ? "exp-owned" : "exp-unowned"}">${e.owned ? "✓" : "⊘"}</span>${fmtExpName(e.name)}${ownerTag}
          </div>`;
        }).join("")}
      </div>`;
  } else {
    expListEl.style.display = "none";
  }
  const notesEl = document.getElementById("modal-notes");
  if (game.notes) {
    notesEl.style.display = "";
    notesEl.innerHTML = `<div class="modal-notes-label">Notes</div><div class="modal-notes-content">${renderNotes(game.notes)}</div>`;
  } else {
    notesEl.style.display = "none";
  }
  document.getElementById("modal-stats").innerHTML = `
    <div class="modal-stat"><div class="label">Times Played</div><div class="value">${totalPlays}</div></div>
    <div class="modal-stat"><div class="label">Avg Time</div><div class="value" style="font-size:1rem;padding-top:3px">${fmtDuration(avgTime)}</div></div>
    <div class="modal-stat"><div class="label">Top Winner</div><div class="value" style="font-size:1rem;padding-top:3px">${topWinner ? `${topWinner[0]} (${topWinner[1]}×)` : "—"}</div></div>`;
  const body = document.getElementById("modal-body");
  if (totalPlays === 0) {
    body.innerHTML = `<div class="modal-empty">No sessions logged yet.</div>`;
  } else {
    const allSessions = [
      ...sessions.map(s => ({ ...s, _type: 'regular' })),
      ...teamSessions.map(ts => ({ ...ts, _type: 'team' }))
    ].sort((a, b) => b.date.localeCompare(a.date));
    body.innerHTML = `
      <table><thead><tr>
        <th>Date</th><th>Players</th>
        <th style="text-align:right;width:38px">Time</th><th>Result</th>
      </tr></thead><tbody>${allSessions.map(s => {
        if (s._type === 'team') {
          const t1win = s.winner === 'team1';
          const t2win = s.winner === 'team2';
          return `
          <tr>
            <td style="font-family:'Courier New',monospace;font-size:0.9rem;color:var(--text-muted);vertical-align:top;white-space:nowrap">${fmtDateTwoLine(s.date)}</td>
            <td style="vertical-align:top">
              <div style="font-size:0.9rem;color:var(--accent);font-family:'Courier New',monospace;letter-spacing:0.06em;text-transform:uppercase">Team 1</div>
              <div style="color:var(--text-muted)">${s.team1.join(', ')}</div>
              <div style="font-size:0.9rem;color:var(--accent);font-family:'Courier New',monospace;letter-spacing:0.06em;text-transform:uppercase;margin-top:6px">Team 2</div>
              <div style="color:var(--text-muted)">${s.team2.join(', ')}</div>
            </td>
            <td style="text-align:right;font-family:'Courier New',monospace;font-size:0.9rem;color:var(--text-muted);vertical-align:top">${fmtDurationTwoLine(s.duration)}</td>
            <td style="font-size:0.9rem;vertical-align:top">${t1win ? `🥇 Team 1<div style="color:var(--text-muted);margin-top:2px">${s.team1.join(', ')}</div>` : t2win ? `🥇 Team 2<div style="color:var(--text-muted);margin-top:2px">${s.team2.join(', ')}</div>` : s.winner === 'dnf' ? `<span style="color:#8a9298">DNF</span>` : '—'}</td>
          </tr>
          ${s.notes ? `<tr style="border-top:none"><td colspan="4" style="padding:0 8px 10px;font-size:0.9rem;color:var(--text-muted);font-style:italic">${s.notes}</td></tr>` : ""}`;
        }
        let podium;
        if (s.places[0] === COOP_WIN)      podium = `<span style="color:var(--accent-bright)">Co-op win</span>`;
        else if (s.places[0] === COOP_LOSS) podium = `<span style="color:var(--red)">Co-op loss</span>`;
        else if (s.places[0] === DNF)       podium = `<span style="color:var(--text-muted)">DNF</span>`;
        else podium = s.places.slice(0,3).map((name,i) => `<div style="white-space:nowrap">${MEDALS[i]} ${name}</div>`).join("");
        return `
        <tr>
          <td style="font-family:'Courier New',monospace;font-size:0.9rem;color:var(--text-muted);vertical-align:top;white-space:nowrap">${fmtDateTwoLine(s.date)}</td>
          <td style="color:var(--text-muted);vertical-align:top">${s.players.map(p => `<div>${p}</div>`).join("")}</td>
          <td style="text-align:right;font-family:'Courier New',monospace;font-size:0.9rem;color:var(--text-muted);vertical-align:top">${fmtDurationTwoLine(s.duration)}</td>
          <td style="font-size:0.9rem;vertical-align:top">${podium}</td>
        </tr>
        ${s.notes ? `<tr style="border-top:none"><td colspan="4" style="padding:0 8px 10px;font-size:0.9rem;color:var(--text-muted);font-style:italic">${s.notes}</td></tr>` : ""}`;
      }).join("")}</tbody></table>`;
  }
  // ── Action row: Edit + Delete ──
  const actionRow = document.createElement("div");
  actionRow.className = "modal-action-row";
  actionRow.innerHTML = `
    <button class="modal-action-edit" id="modal-edit-game-btn">✏ Edit game</button>
    <button class="modal-action-delete" id="modal-delete-game-btn">Delete game</button>`;
  body.appendChild(actionRow);

  document.getElementById("modal-edit-game-btn").onclick = () => {
    document.getElementById("modal-backdrop").classList.remove("open");
    openAddGameModal(game);
  };

  document.getElementById("modal-delete-game-btn").onclick = (e) => {
    const btn = e.currentTarget;
    if (btn.dataset.armed === "1") {
      btn.textContent = "Deleting…";
      btn.disabled = true;
      atDelete("Games Library", game.id).then(() => {
        document.getElementById("modal-backdrop").classList.remove("open");
        init();
      }).catch(() => {
        btn.textContent = "Error — try again";
        btn.disabled = false;
        btn.dataset.armed = "";
        btn.classList.remove("armed");
      });
    } else {
      btn.dataset.armed = "1";
      btn.classList.add("armed");
      btn.textContent = "⚠ Confirm delete";
      clearTimeout(btn._resetTimer);
      btn._resetTimer = setTimeout(() => {
        btn.dataset.armed = "";
        btn.classList.remove("armed");
        btn.textContent = "Delete game";
      }, 3000);
    }
  };

  document.getElementById("modal-backdrop").classList.add("open");
}

// ── Player Modal ──────────────────────────────────────────────
function openPlayerModal(name) {
  const ps = _playerStats[name];
  if (!ps) return;
  const sessions     = _playLog.filter(s => s.players.includes(name));
  const teamSessions = _teamSessions.filter(ts => [...ts.team1, ...ts.team2].includes(name));
  const gamePlays = {};
  sessions.forEach(s => { gamePlays[s.game] = (gamePlays[s.game] || 0) + 1; });
  teamSessions.forEach(ts => { gamePlays[ts.game] = (gamePlays[ts.game] || 0) + 1; });
  const sortedPlayerGames = Object.entries(gamePlays).sort((a, b) => b[1] - a[1]);
  const maxPlayerPlays    = sortedPlayerGames[0]?.[1] ?? 0;
  const topPlayerGames    = sortedPlayerGames.filter(([, n]) => n === maxPlayerPlays);
  const favGameLabel      = topPlayerGames.length === 0 ? "—"
    : topPlayerGames.length === 1 ? topPlayerGames[0][0]
    : topPlayerGames.length === 2 ? `${topPlayerGames[0][0]} & ${topPlayerGames[1][0]}`
    : `${topPlayerGames.length}-way tie`;
  const rank     = _leaderboard.findIndex(p => p.name === name) + 1;
  const rankLabel = MEDALS[rank - 1] ?? `#${rank}`;
  document.getElementById("player-modal-name").textContent = name;
  document.getElementById("player-modal-medals").innerHTML = `
    <div class="player-medal-item"><span>🥇</span><span class="medal-count">${ps.firsts}</span></div>
    <div class="player-medal-item"><span>🥈</span><span class="medal-count">${ps.seconds}</span></div>
    <div class="player-medal-item"><span>🥉</span><span class="medal-count">${ps.thirds}</span></div>
    <div class="player-medal-item"><span>👤</span><span class="medal-count">${ps.sessions}</span></div>`;
  document.getElementById("player-modal-stats").innerHTML = `
    <div class="modal-stat"><div class="label">Rank</div><div class="value">${rankLabel}</div></div>
    <div class="modal-stat"><div class="label">Points</div><div class="value">${ps.pts}</div></div>
    <div class="modal-stat"><div class="label">Most Played</div><div class="value" style="font-size:0.9rem;padding-top:4px;line-height:1.3">${favGameLabel}</div></div>`;
  const body = document.getElementById("player-modal-body");
  const allPlayerSessions = [
    ...sessions.map(s => ({ ...s, _type: 'regular' })),
    ...teamSessions.map(ts => ({ ...ts, _type: 'team' }))
  ].sort((a, b) => b.date.localeCompare(a.date));
  body.innerHTML = `
    <table><thead><tr>
      <th>Date</th><th>Game</th><th style="text-align:right">Result</th>
    </tr></thead><tbody>${allPlayerSessions.map(s => {
      if (s._type === 'team') {
        const won = (s.winner === 'team1' && s.team1.includes(name)) || (s.winner === 'team2' && s.team2.includes(name));
        return `
        <tr>
          <td style="font-family:'Courier New',monospace;font-size:0.9rem;color:var(--text-muted);vertical-align:top;white-space:nowrap">${fmtDateTwoLine(s.date)}</td>
          <td>
            <div>${s.game}</div>
            <div style="font-size:0.9rem;color:var(--text-muted);margin-top:2px">${[...s.team1, ...s.team2].filter(p => p !== name).join(', ')}</div>
          </td>
          <td style="text-align:right;font-size:0.9rem;white-space:nowrap">${s.winner === 'dnf' ? '<span style="color:#8a9298">DNF</span>' : won ? '🥇 Team win' : '<span style="color:var(--text-muted)">Team loss</span>'}</td>
        </tr>`;
      }
      let finish;
      if (s.places[0] === COOP_WIN)      finish = `<span style="color:var(--accent-bright)">Co-op win</span>`;
      else if (s.places[0] === COOP_LOSS) finish = `<span style="color:var(--red)">Co-op loss</span>`;
      else if (s.places[0] === DNF)       finish = `<span style="color:var(--text-muted)">DNF</span>`;
      else {
        const idx = s.places.indexOf(name);
        finish = idx >= 0
          ? `${MEDALS[idx]} ${idx === 0 ? "1st" : idx === 1 ? "2nd" : "3rd"}`
          : `<span style="color:var(--text-muted)">0</span>`;
      }
      return `
      <tr>
        <td style="font-family:'Courier New',monospace;font-size:0.9rem;color:var(--text-muted);vertical-align:top;white-space:nowrap">${fmtDateTwoLine(s.date)}</td>
        <td>
          <div>${s.game}</div>
          <div style="font-size:0.9rem;color:var(--text-muted);margin-top:2px">${s.players.filter(p => p !== name).join(", ")}</div>
        </td>
        <td style="text-align:right;font-size:0.9rem;white-space:nowrap">${finish}</td>
      </tr>
      ${s.notes ? `<tr style="border-top:none"><td colspan="3" style="padding:0 8px 10px;font-size:0.9rem;color:var(--text-muted);font-style:italic">${s.notes}</td></tr>` : ""}`;
    }).join("")}</tbody></table>`;
  document.getElementById("player-modal-backdrop").classList.add("open");
}

// ── Log Session Modal ─────────────────────────────────────────
const PLAYERS    = ['Dave','Leanna','Peter','Mark','Jay','Ben','Shannon','Marc','Heather','Nathan'];
const TEAM_GAMES = ['Codenames'];

function toggleSessionType(type) {
  document.getElementById('log-regular-section').style.display = type === 'regular' ? '' : 'none';
  document.getElementById('log-team-section').style.display   = type === 'teams'   ? '' : 'none';
}

function openEditSessionModal(id, type) {
  const session = type === 'teams'
    ? _teamSessions.find(ts => ts.id === id)
    : _playLog.find(s => s.id === id);
  if (!session) return;
  _logEditId   = id;
  _logEditType = type;
  openLogModal(session, type);
}

function openLogModal(session = null, sessionType = null) {
  const isEdit = !!session;
  const type   = sessionType || (isEdit ? _logEditType : 'regular') || 'regular';

  document.getElementById('log-modal-title').textContent = isEdit ? 'Edit Session' : 'Log a Session';
  document.getElementById('log-date').value = isEdit ? session.date : new Date().toISOString().split('T')[0];

  // Game dropdown
  const gameSelect = document.getElementById('log-game');
  gameSelect.innerHTML = '<option value="">Select a game…</option>'
    + _gamesLibrary.map(g => `<option value="${g.name}">${g.name}</option>`).join('');
  if (isEdit) gameSelect.value = session.game;

  // Session type chips
  document.querySelectorAll('#log-type-chips .chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`#log-type-chips .chip[data-type="${type}"]`).classList.add('active');
  toggleSessionType(type);

  if (type === 'teams') {
    // Team chips — pre-select if editing
    document.getElementById('log-team1').innerHTML = PLAYERS.map(p =>
      `<button class="chip${isEdit && session.team1.includes(p) ? ' active' : ''}" data-player="${p}">${p}</button>`).join('');
    document.getElementById('log-team2').innerHTML = PLAYERS.map(p =>
      `<button class="chip${isEdit && session.team2.includes(p) ? ' active' : ''}" data-player="${p}">${p}</button>`).join('');
    document.querySelectorAll('#log-winner-chips .chip').forEach(c => {
      c.classList.toggle('active', isEdit && c.dataset.winner === session.winner);
    });
  } else {
    // Player chips — pre-select if editing
    const activePlayers = new Set(isEdit ? session.players : []);
    const knownHTML = PLAYERS.map(p =>
      `<button class="chip${activePlayers.has(p) ? ' active' : ''}" data-player="${p}">${p}</button>`).join('');
    const extraHTML = isEdit
      ? session.players.filter(p => !PLAYERS.includes(p))
          .map(p => `<button class="chip active" data-player="${p}">${p}</button>`).join('')
      : '';
    document.getElementById('log-players').innerHTML = knownHTML + extraHTML;
    document.getElementById('log-new-player').value = '';

    // Result chips
    let resultType = 'competitive';
    if (isEdit) {
      if      (session.places[0] === COOP_WIN)  resultType = 'coop_win';
      else if (session.places[0] === COOP_LOSS) resultType = 'coop_loss';
      else if (session.places[0] === DNF)       resultType = 'DNF';
    }
    document.querySelectorAll('#log-result-chips .chip').forEach(c =>
      c.classList.toggle('active', c.dataset.value === resultType));
    document.getElementById('log-placing-section').style.display = resultType === 'competitive' ? '' : 'none';
    updatePlacingDropdowns();
    if (isEdit && resultType === 'competitive') {
      if (session.places[0]) document.getElementById('log-first').value  = session.places[0];
      if (session.places[1]) document.getElementById('log-second').value = session.places[1];
      if (session.places[2]) document.getElementById('log-third').value  = session.places[2];
    }
  }

  // Duration chips
  document.querySelectorAll('#log-duration-chips .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('log-custom-duration').style.display = 'none';
  document.getElementById('log-custom-hrs').value = '';
  document.getElementById('log-custom-min').value = '';
  if (isEdit && session.duration) {
    const match = document.querySelector(`#log-duration-chips .chip[data-mins="${session.duration}"]`);
    if (match) {
      match.classList.add('active');
    } else {
      document.querySelector('#log-duration-chips .chip[data-mins="other"]').classList.add('active');
      document.getElementById('log-custom-duration').style.display = '';
      document.getElementById('log-custom-hrs').value = Math.floor(session.duration / 60) || '';
      document.getElementById('log-custom-min').value = session.duration % 60 || '';
    }
  }

  document.getElementById('log-notes').value = isEdit ? (session.notes || '') : '';
  document.getElementById('log-feedback').textContent = '';
  const btn = document.getElementById('log-submit');
  btn.disabled = false;
  btn.textContent = isEdit ? 'Save Changes' : 'Submit Session';

  // Delete row — only visible when editing
  const deleteRow = document.getElementById('log-delete-row');
  const deleteBtn = document.getElementById('log-delete-btn');
  deleteRow.style.display = isEdit ? '' : 'none';
  deleteBtn.textContent = 'Delete session';
  deleteBtn.classList.remove('armed');
  deleteBtn.dataset.armed = '';
  deleteBtn.disabled = false;
  clearTimeout(deleteBtn._resetTimer);
  deleteBtn.onclick = null;
  if (isEdit) {
    const editId   = _logEditId;
    const editType = _logEditType;
    deleteBtn.onclick = () => {
      if (deleteBtn.dataset.armed === '1') {
        deleteBtn.textContent = 'Deleting…';
        deleteBtn.disabled = true;
        const table = editType === 'teams' ? 'Team Log' : 'Play Log';
        atDelete(table, editId).then(() => {
          _logEditId = null; _logEditType = null;
          closeLogModal();
          init();
        }).catch(() => {
          deleteBtn.textContent = 'Error — try again';
          deleteBtn.disabled = false;
          deleteBtn.dataset.armed = '';
          deleteBtn.classList.remove('armed');
        });
      } else {
        deleteBtn.dataset.armed = '1';
        deleteBtn.classList.add('armed');
        deleteBtn.textContent = '⚠ Tap again to confirm delete';
        clearTimeout(deleteBtn._resetTimer);
        deleteBtn._resetTimer = setTimeout(() => {
          deleteBtn.dataset.armed = '';
          deleteBtn.classList.remove('armed');
          deleteBtn.textContent = 'Delete session';
        }, 3000);
      }
    };
  }

  document.getElementById('log-modal-backdrop').classList.add('open');
}

function updatePlacingDropdowns() {
  const selected = [...document.querySelectorAll('#log-players .chip.active')].map(c => c.dataset.player);
  ['log-first','log-second','log-third'].forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">—</option>'
      + selected.map(p => `<option value="${p}"${p===cur?' selected':''}>${p}</option>`).join('');
  });
}

async function submitSession() {
  const sessionType = document.querySelector('#log-type-chips .chip.active')?.dataset.type || 'regular';
  const date = document.getElementById('log-date').value;
  const game = document.getElementById('log-game').value;

  // Duration (shared)
  const durChip = document.querySelector('#log-duration-chips .chip.active');
  let duration = 0;
  if (durChip && durChip.dataset.mins !== 'other') {
    duration = parseInt(durChip.dataset.mins) || 0;
  } else if (durChip && durChip.dataset.mins === 'other') {
    const hrs = parseInt(document.getElementById('log-custom-hrs').value) || 0;
    const min = parseInt(document.getElementById('log-custom-min').value) || 0;
    duration = hrs * 60 + min;
  }
  const notes = document.getElementById('log-notes').value.trim();

  if (!date) { logFeedback('Please select a date.', 'err'); return; }
  if (!game) { logFeedback('Please select a game.', 'err'); return; }

  const btn = document.getElementById('log-submit');
  const isEdit      = !!_logEditId;
  const submitLabel = isEdit ? 'Save Changes' : 'Submit Session';
  btn.disabled = true;
  btn.textContent = isEdit ? 'Saving…' : 'Submitting…';

  try {
    if (sessionType === 'teams') {
      const team1      = [...document.querySelectorAll('#log-team1 .chip.active')].map(c => c.dataset.player);
      const team2      = [...document.querySelectorAll('#log-team2 .chip.active')].map(c => c.dataset.player);
      const winnerChip = document.querySelector('#log-winner-chips .chip.active');
      const winner     = winnerChip?.dataset.winner;

      if (!team1.length) { logFeedback('Please select Team 1 players.', 'err'); btn.disabled = false; btn.textContent = submitLabel; return; }
      if (!team2.length) { logFeedback('Please select Team 2 players.', 'err'); btn.disabled = false; btn.textContent = submitLabel; return; }
      if (!winner)       { logFeedback('Please select a winner or DNF.', 'err'); btn.disabled = false; btn.textContent = submitLabel; return; }

      const fields = {
        Date: date, Game: game,
        'Team 1': team1.join(', '),
        'Team 2': team2.join(', '),
        Winner: winner === 'team1' ? 'Team 1' : winner === 'team2' ? 'Team 2' : 'DNF'
      };
      if (duration > 0) fields['Duration'] = duration;
      fields['Notes'] = notes || null;
      if (isEdit) { await atUpdate('Team Log', _logEditId, fields); _logEditId = null; _logEditType = null; }
      else          await atCreate('Team Log', fields);

    } else {
      const players    = [...document.querySelectorAll('#log-players .chip.active')].map(c => c.dataset.player);
      const resultChip = document.querySelector('#log-result-chips .chip.active');
      const result     = resultChip ? resultChip.dataset.value : 'competitive';

      if (!players.length) { logFeedback('Please select at least one player.', 'err'); btn.disabled = false; btn.textContent = submitLabel; return; }

      const fields = { Date: date, Game: game, Players: players.join(', ') };
      if (result === 'competitive') {
        const first  = document.getElementById('log-first').value;
        const second = document.getElementById('log-second').value;
        const third  = document.getElementById('log-third').value;
        if (!first) { logFeedback('Please select a 1st place winner.', 'err'); btn.disabled = false; btn.textContent = submitLabel; return; }
        fields['1st Place'] = first;
        if (second) fields['2nd Place'] = second;
        if (third)  fields['3rd Place'] = third;
      } else if (result === 'DNF')       { fields['1st Place'] = 'DNF'; }
        else if (result === 'coop_win')  { fields['1st Place'] = 'Everyone!'; }
        else if (result === 'coop_loss') { fields['1st Place'] = 'Loss'; }
      if (duration > 0) fields['Duration'] = duration;
      fields['Notes'] = notes || null;
      if (isEdit) { await atUpdate('Play Log', _logEditId, fields); _logEditId = null; _logEditType = null; }
      else          await atCreate('Play Log', fields);
    }

    logFeedback(isEdit ? '✅ Session updated!' : '✅ Session logged!', 'ok');
    btn.textContent = isEdit ? 'Saved!' : 'Logged!';
    setTimeout(init, 1200);
  } catch (err) {
    logFeedback('⚠ Could not submit — check your connection.', 'err');
    btn.disabled = false;
    btn.textContent = submitLabel;
  }
}

function logFeedback(msg, type) {
  const el = document.getElementById('log-feedback');
  el.textContent = msg;
  el.style.color = type === 'err' ? 'var(--red)' : 'var(--accent-bright)';
}

// Add custom player
function addCustomPlayer() {
  const input = document.getElementById('log-new-player');
  const name = input.value.trim();
  if (!name) return;

  // If already in the list, just activate their chip
  const existing = document.querySelector(`#log-players .chip[data-player="${name}"]`);
  if (existing) {
    existing.classList.add('active');
    input.value = '';
    updatePlacingDropdowns();
    return;
  }

  // Create and append a new active chip
  const chip = document.createElement('button');
  chip.className = 'chip active';
  chip.dataset.player = name;
  chip.textContent = name;
  document.getElementById('log-players').appendChild(chip);

  input.value = '';
  updatePlacingDropdowns();
}

function openAddGameModal(game = null) {
  const isEdit = !!game;
  _agEditId = isEdit ? game.id : null;
  document.getElementById('ag-modal-title').textContent = isEdit ? 'Edit Game' : 'Add a Game';
  document.getElementById('ag-name').value     = isEdit ? game.name                          : '';
  document.getElementById('ag-min').value      = isEdit && game.min         != null ? game.min         : '';
  document.getElementById('ag-max').value      = isEdit && game.max         != null ? game.max         : '';
  document.getElementById('ag-exp-min').value  = isEdit && game.expansionMin != null ? game.expansionMin : '';
  document.getElementById('ag-exp-max').value  = isEdit && game.expansionMax != null ? game.expansionMax : '';
  document.getElementById('ag-bgg-url').value      = isEdit ? (game.bggUrl      || '') : '';
  document.getElementById('ag-rules-url').value    = isEdit ? (game.rulesUrl    || '') : '';
  document.getElementById('ag-tutorial-url').value = isEdit ? (game.tutorialUrl || '') : '';
  document.getElementById('ag-notes').value        = isEdit ? (game.notes       || '') : '';
  document.getElementById('ag-feedback').textContent = '';
  document.getElementById('ag-owners').innerHTML =
    PLAYERS.map(p => `<button class="chip${isEdit && game.owners.includes(p) ? ' active' : ''}" data-owner="${p}">${p}</button>`).join('');
  const btn = document.getElementById('ag-submit');
  btn.disabled = false;
  btn.textContent = isEdit ? 'Save Changes' : 'Add Game';
  document.getElementById('add-game-modal-backdrop').classList.add('open');
}

async function submitNewGame() {
  const name     = document.getElementById('ag-name').value.trim();
  const min      = document.getElementById('ag-min').value;
  const max      = document.getElementById('ag-max').value;
  const expMin   = document.getElementById('ag-exp-min').value;
  const expMax   = document.getElementById('ag-exp-max').value;
  const owners      = [...document.querySelectorAll('#ag-owners .chip.active')].map(c => c.dataset.owner).join(', ');
  const bggUrl      = document.getElementById('ag-bgg-url').value.trim();
  const rulesUrl    = document.getElementById('ag-rules-url').value.trim();
  const tutorialUrl = document.getElementById('ag-tutorial-url').value.trim();
  const notes       = document.getElementById('ag-notes').value.trim();

  if (!name)        { agFeedback('Please enter a game name.', 'err'); return; }
  if (!min || !max) { agFeedback('Please enter min and max players.', 'err'); return; }

  const fields = { 'Game Name': name, 'Min Players': Number(min), 'Max Players': Number(max) };
  if (expMin)       fields['Expansion Min'] = Number(expMin);
  if (expMax)       fields['Expansion Max'] = Number(expMax);
  if (owners)       fields['Owners']        = owners;
  if (bggUrl)       fields['BGG URL']       = bggUrl;
  if (rulesUrl)     fields['Rules URL']     = rulesUrl;
  if (tutorialUrl)  fields['Tutorial URL']  = tutorialUrl;
  fields['Notes'] = notes || null;

  const isEdit = !!_agEditId;
  const btn = document.getElementById('ag-submit');
  btn.disabled = true;
  btn.textContent = isEdit ? 'Saving…' : 'Adding…';

  try {
    if (isEdit) {
      const editId = _agEditId;
      await atUpdate('Games Library', editId, fields);
      _agLastSavedId = editId;
      _agEditId = null;
      agFeedback('✅ Saved!', 'ok');
      btn.textContent = 'Save Changes';
      btn.disabled = false;
      init(); // refresh in background
    } else {
      await atCreate('Games Library', fields);
      agFeedback('✅ Game added!', 'ok');
      btn.textContent = 'Added!';
      setTimeout(init, 1200);
    }
  } catch (err) {
    agFeedback('⚠ Could not submit — check your connection.', 'err');
    btn.disabled = false;
    btn.textContent = isEdit ? 'Save Changes' : 'Add Game';
  }
}

  el.textContent = msg;

}

}

// ── Init: cache-first, then refresh from Airtable ────────────
const CACHE_KEY = "bgn_cache_v4";

async function init() {
  const statusEl = document.getElementById("data-status");

  // 1. Show cached data instantly if available
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    try {
      const data    = JSON.parse(cached);
      const playLog = [...data.sessions].sort((a, b) => b.date.localeCompare(a.date));
      statusEl.textContent = "updating…";
      renderDashboard(data.games, playLog, data.expansions || [], data.teamSessions || []);
    } catch (_) { /* ignore corrupt cache */ }
  }

  // 2. Fetch fresh from Airtable in parallel
  try {
    const [gameRecs, sessionRecs, expRecs, teamRecs] = await Promise.all([
      atFetch("Games Library", "sort[0][field]=Game%20Name&sort[0][direction]=asc"),
      atFetch("Play Log",      "sort[0][field]=Date&sort[0][direction]=desc"),
      atFetch("Expansions"),
      atFetch("Team Log",      "sort[0][field]=Date&sort[0][direction]=desc")
    ]);
    const data = {
      games:        gameRecs.map(parseGame),
      sessions:     sessionRecs.map(parseSession),
      expansions:   expRecs.map(parseExpansion),
      teamSessions: teamRecs.map(parseTeamSession)
    };
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    statusEl.textContent = "live data";
    renderDashboard(data.games, data.sessions, data.expansions, data.teamSessions);
  } catch (err) {
    console.error("Failed to load data:", err);
    if (cached) {
      statusEl.textContent = "⚠ cached data";
    } else {
      statusEl.textContent = "⚠ connection error";
      document.getElementById("session-list").innerHTML =
        `<div style="color:var(--text-muted);font-size:0.9rem;text-align:center;padding:32px 0;font-family:'Courier New',monospace;letter-spacing:0.08em">Could not connect. Please refresh.</div>`;
    }
  }
}

// ── Auto-lock body scroll whenever any modal is open ─────────
new MutationObserver(() => {
  const anyOpen = !!document.querySelector('.modal-backdrop.open');
  if (anyOpen && document.body.style.position !== 'fixed') lockScroll();
  else if (!anyOpen && document.body.style.position === 'fixed') unlockScroll();
}).observe(document.body, { subtree: true, attributeFilter: ['class'], attributes: true });

// ── Pull-to-refresh ───────────────────────────────────────────
(function() {
  const THRESHOLD = 70;
  const ind = document.getElementById('ptr-indicator');
  let startY = 0, pulling = false, triggered = false;

  function modalsOpen() { return !!document.querySelector('.modal-backdrop.open'); }

  document.addEventListener('touchstart', e => {
    if (window.scrollY !== 0 || modalsOpen()) return;
    startY = e.touches[0].clientY;
    pulling = true; triggered = false;
    ind.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const pull = Math.min(Math.max(0, e.touches[0].clientY - startY) * 0.45, THRESHOLD + 16);
    ind.style.transform = `translateY(${pull - 48}px)`;
    if (!ind.classList.contains('ptr-spin')) {
      ind.querySelector('#ptr-spinner').style.transform = `rotate(${Math.min(pull / THRESHOLD, 1) * 300}deg)`;
    }
    triggered = pull >= THRESHOLD;
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    ind.style.transition = 'transform 0.25s ease';
    if (triggered) {
      ind.style.transform = 'translateY(0)';
      ind.classList.add('ptr-spin');
      ind.querySelector('#ptr-spinner').style.transform = '';
      localStorage.removeItem(CACHE_KEY);
      init().finally(() => {
        ind.style.transition = 'transform 0.3s ease';
        ind.style.transform = 'translateY(-48px)';
        setTimeout(() => ind.classList.remove('ptr-spin'), 350);
      });
    } else {
      ind.style.transform = 'translateY(-48px)';
    }
  }, { passive: true });
})();

init();
</script>
